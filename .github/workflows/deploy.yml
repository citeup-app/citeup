name: Deploy

on:
  - push
  - workflow_dispatch

env:
  ANTHROPIC_API_KEY: "sk-ant-"
  BOT_TRACKER_API_KEY: "bot-tracker-api-key"
  BOT_TRACKER_URL: "http://localhost:9222/api/track"
  POSTGRES_PRISMA_URL: "postgresql://postgres:postgres@localhost:5432/citeup"
  DEBUG: ""
  GOOGLE_GENERATIVE_AI_API_KEY: "AIza"
  NODE_OPTIONS: "--max-old-space-size=3096"
  OPENAI_API_KEY: "sk-proj-"
  PERPLEXITY_API_KEY: "pk-prod-"
  REDIS_URL: "redis://localhost:6379"
  RESEND_API_KEY: "preq_test_..."
  SESSION_SECRET: "secret"
  VITE_APP_URL: "http://localhost:9222"
  VITE_EMAIL_FROM: "hello@cite.me.in"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: citeup
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Cache NPM dependencies
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install NPM dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: pnpm install

      - name: Set PLAYWRIGHT_VERSION
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version)" >> $GITHUB_ENV

      - name: Cache Playwright
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright (Chromium)
        timeout-minutes: 5
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Setup database schema for testing
        run: |
          pnpm prisma generate 
          pnpm prisma db push

      - name: Check secrets
        run: pnpm secretlint "**/*" --format stylish

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Lint code
        run: biome lint

      - name: Generate React Router types
        run: pnpm react-router typegen

      - name: Check types
        run: pnpm tsc --noEmit --strict
        env:
          NODE_OPTIONS: "--max-old-space-size=3096"

      - name: Run Tests
        if: false
        run: pnpm --expose-gc vitest run

      - name: Run Playwright Tests
        if: false
        run: pnpm playwright test

      - name: Upload Playwright Test Results
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: playwright-test-results
          path: __screenshots__

      - name: Vercel Link
        run: |
          pnpm dlx vercel link --yes --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_TEAM }} --project ${{ env.VERCEL_PROJECT }}
          pnpm dlx vercel env pull --environment production
        env:
          VERCEL_TEAM: ${{ env.VERCEL_TEAM }}
          VERCEL_PROJECT: ${{ env.VERCEL_PROJECT }}

      - name: Update database
        if: github.ref == 'refs/heads/main'
        run: |
          export $(cat .env.local | grep -v '^#' | xargs)
          pnpm prisma db push

      - name: Deploy to Vercel
        uses: nexterias/actions-vercel@v1
        if: github.ref == 'refs/heads/main'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          org-id: ${{ env.VERCEL_TEAM }}
          prebuilt: false
          production: false
          project-id: ${{ env.VERCEL_PROJECT }}
          token: ${{ secrets.VERCEL_TOKEN }}
        env:
          SENTRY_AUTH_TOKEN: "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"
          SENTRY_ORG: "labnotes"
          SENTRY_PROJECT: "citeup"
          VERCEL_PROJECT: "prj_Ipf1EVCJ9lIgoCIIbiizNp5W5O66"
          VERCEL_TEAM: "team_bjyg9pgn8TQQVP2NLMPnSYSN"
